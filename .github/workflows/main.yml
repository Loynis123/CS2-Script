name: Steam Check

on:
  schedule:
    - cron: '0 * * * *' # Запуск каждый час
  workflow_dispatch:      # Позволяет запускать вручную кнопкой

jobs:
  build:
    runs-on: ubuntu-latest
    # Даем права на запись контента (чтобы бот мог сохранять json)
    permissions:
      contents: write
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Обновлено с v3

      - name: Set up Python
        uses: actions/setup-python@v5 # Обновлено с v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run script
        run: python bot.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add db_prices.json
          # Если изменений нет, скрипт не упадет с ошибкой
          git commit -m "Update price history [skip ci]" || echo "No changes to commit"
          git push
